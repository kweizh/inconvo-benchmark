ase connection to introspect the schema and generate the semantic model. Your task is to initialize a new Inconvo project and configure it to connect to an existing PostgreSQL database.\n\n## Requirements\n- You must initialize an Inconvo project in `/home/user/myproject`.\n- You must configure the database connection by creating a `.env` file in the project directory.\n- The `.env` file must contain the `DATABASE_URL` environment variable set to `postgresql://inconvo:inconvo@localhost:5432/inconvo_db`.\n- The project must have a valid `inconvo.yaml` file after initialization.\n\n## Implementation Guide\n1. Navigate to `/home/user/myproject`.\n2. Create a `.env` file and set `DATABASE_URL=postgresql://inconvo:inconvo@localhost:5432/inconvo_db`.\n3. Run the appropriate command to initialize the Inconvo project (e.g., `npx inconvo@latest init` or the equivalent if it's a manual initialization).\n\n## Constraints\n- Project path: `/home/user/myproject`\n- Database URL: `postgresql://inconvo:inconvo@localhost:5432/inconvo_db`"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"mqwaxdcwD8aT8SXy73szk\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/inconvo-benchmark/_next/static/chunks/467141d06f4e2f60.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/inconvo-benchmark/_next/static/chunks/babff0e7418ab052.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/inconvo-benchmark/_next/static/chunks/3ecbb78a8ff87549.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"en\",\"suppressHydrationWarning\":true,\"children\":[\"$\",\"body\",null,{\"className\":\"inter_5972bc34-module__OU16Qa__className antialiased\",\"chil
