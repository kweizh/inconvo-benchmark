name = "context_mapping_user_id"
description = "Implement row-level security via context mapping for the sales table."

[environment]
python_version = "3.11"
node_version = "20"

[dependencies]
apt = ["postgresql-client"]
npm = ["inconvo"]
pip = ["pytest", "psycopg2-binary", "pyyaml"]

[evaluation]
test_timeout = 60
entrypoint = "pytest tests/test_final_state.py"

[setup]
# This would normally run SQL to create the table
# For this task, we assume the environment provides a DATABASE_URL
# and we can run a script to initialize the schema.
script = """
psql $DATABASE_URL -c "CREATE TABLE IF NOT EXISTS sales (id SERIAL PRIMARY KEY, amount DECIMAL, organisation_id INTEGER);"
psql $DATABASE_URL -c "INSERT INTO sales (amount, organisation_id) VALUES (100, 1), (200, 2), (300, 1);"
"""
