version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
INCONVO_API_KEY = "${INCONVO_API_KEY}"
INCONVO_AGENT_ID = "${INCONVO_AGENT_ID}"
INCONVO_POSTGRESQL_URL = "${INCONVO_POSTGRESQL_URL}"
DATABASE_URL = "${INCONVO_POSTGRESQL_URL}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
POCHI_LOG = "debug"
INCONVO_API_KEY = "${INCONVO_API_KEY}"
INCONVO_AGENT_ID = "${INCONVO_AGENT_ID}"
INCONVO_POSTGRESQL_URL = "${INCONVO_POSTGRESQL_URL}"

[solution.env]
