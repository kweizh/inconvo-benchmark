tables:
  orders:
    state: Queryable
    fields:
      id: { state: On }
      total_amount: { state: On, type: measure }
      created_at: { state: On, type: dimension }
  products:
    state: Queryable
    fields:
      id: { state: On }
      name: { state: On }
relations:
  - name: order_to_product
    left: orders.product_id
    right: products.id
