tables:
  orders:
    state: Queryable
    fields:
      id: { state: On }
      buyer_id: { state: On, type: dimension }
      seller_id: { state: On, type: dimension }
      total_amount: { state: On, type: measure }
  users:
    state: Joinable
    fields:
      id: { state: On }
      name: { state: On }
relations:
  - name: order_to_buyer
    left: orders.buyer_id
    right: users.id
  - name: order_to_seller
    left: orders.seller_id
    right: users.id
