version: 1
tables:
  - name: orders
    description: "Table containing customer orders"
    queryable: true
    columns:
      - name: order_id
        type: integer
        primary_key: true
      - name: store_id
        type: integer
        description: "The ID of the store where the order was placed"
      - name: amount
        type: decimal
      - name: created_at
        type: timestamp
