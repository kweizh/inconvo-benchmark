tables:
  orders:
    description: "Customer orders"
    sql: "SELECT * FROM orders"
    columns:
      order_id:
        type: "integer"
        primary_key: true
      store_id:
        type: "integer"
      customer_id:
        type: "integer"
      amount:
        type: "number"
      status:
        type: "string"
      created_at:
        type: "timestamp"
    filters:
      - sql: "store_id = {{context.store_id}}"
