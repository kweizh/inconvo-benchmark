version: 1
models:
  - name: orders
    table: orders
    measures:
      - name: total_amount
        column: total_amount
        type: sum
    dimensions:
      - name: id
        column: id
        type: number
        primary_key: true
      - name: product_id
        column: product_id
        type: number

  - name: products
    table: products
    dimensions:
      - name: id
        column: id
        type: number
        primary_key: true
      - name: name
        column: name
        type: string

relationships:
  - name: order_products
    left: orders
    right: products
    join_on: "${orders.product_id} = ${products.id}"
    type: many_to_one
