tables:
  orders:
    state: Queryable
    fields:
      id: { state: On }
      customer_id: { state: On }
      total_amount: { state: On, type: measure }
      cost: { state: On, type: measure }
      gross_margin:
        state: On
        type: measure
        formula: total_amount - cost
      created_at: { state: On, type: dimension }
  customers:
    state: Joinable
    fields:
      id: { state: On }
      name: { state: On }
relations:
  - name: order_to_customer
    left: orders.customer_id
    right: customers.id
