version: "1.0"
tables:
  - name: orders
    type: queryable
    columns:
      - name: id
        type: string
      - name: customer_id
        type: string
      - name: amount
        type: number
      - name: order_date
        type: date
    relationships:
      - column: customer_id
        to_table: customers
        to_column: id

  - name: customers
    type: joinable
    columns:
      - name: id
        type: string
      - name: name
        type: string
      - name: email
        type: string
